<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}我的学习笔记{% endblock %}</title>
    <style>
        /* 公共样式（所有页面复用） */
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {font-family: Arial, sans-serif; padding-bottom: 60px;}
        header {background: #2c3e50; color: white; padding: 20px; text-align: center;}
        nav {margin: 10px 0; text-align: center;}
        nav a {margin: 0 15px; text-decoration: none; color: #2c3e50; font-weight: bold;}
        nav a:hover {color: #3498db;}
        .container {max-width: 800px; margin: 20px auto; padding: 0 20px;}
        footer {background: #2c3e50; color: white; text-align: center; padding: 10px; position: fixed; bottom: 0; width: 100%;}
        .btn {padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer;}
        .btn-primary {background: #3498db; color: white;}
        .btn-danger {background: #e74c3c; color: white;}
        .form-group {margin: 15px 0;}
        .form-group label {display: block; margin-bottom: 5px;}
        .form-group input, .form-group textarea {width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px;}
        .form-group textarea {height: 200px; resize: vertical;}
        .note-item {border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 4px;}
        .note-item h3 {color: #2c3e50; margin-bottom: 10px;}
        .note-item .meta {color: #999; font-size: 12px; margin: 10px 0;}
    </style>
</head>
<body>
    <!-- 公共导航栏 -->
    <header>
        <h1>Flask学习笔记管理系统</h1>
    </header>
    <nav>
        <a href="/">笔记列表</a>
        <a href="/add">新增笔记</a>
        <a href="/about">关于</a>
        <!-- 新增搜索表单 -->
        <form action="/search" method="get" style="display: inline;">
            <input type="text" name="keyword" placeholder="输入标题搜索" style="padding: 5px;">
            <button type="submit" style="padding: 5px;">搜索</button>
        </form>
    </nav>
    
    <div class="container">
        <!-- 新增侧边栏块 -->
        <div class="sidebar" style="float: left; width: 200px; margin-right: 20px;">
            {% block sidebar %}
            <!-- 默认侧边栏内容 -->
            <h4>笔记分类</h4>
            <ul>
                <li>Flask</li>
                <li>Python</li>
                <li>算法</li>
            </ul>
            {% endblock %}
        </div>
        <!-- 主体内容块 -->
        <div class="main" style="float: left; width: 500px;">
            {% block content %}{% endblock %}
        </div>
    </div>
    
    <!-- 公共页脚 -->
    <footer>
        © 2026 我的Flask学习项目 | 杭电计科学习笔记
    </footer>
</body>
</html>
